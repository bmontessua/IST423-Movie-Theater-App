<!DOCTYPE html>
<html>
<head>
    <title>Movies</title>
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/movies">View Movies</a></li>
            <li><a href="/showtimes">View Showtimes</a></li>
            <li><a href="/theaters">View Theaters</a></li>
            <li><a href="/customers">Search Customers</a></li>
        </ul>
    </nav>
    <div id="movie-search">
        <h2>Search Showtimes</h2>
        <form method="POST">
            <input type="text" name="title" placeholder="Search by movie title..." value="{{ search or '' }}">
            <button type="submit">Search</button>
        </form>
    </div>
    <h1>Showtimes</h1>
    <div id="movie-table">
        <table>
            <tr>
                <th>Movie ID</th>
                <th>Title</th>
                <th>Showing ID</th>
                <th>Date</th>
                <th>Showtime</th>
            </tr>

            {% for movie in movies %}
            <tr>
                <td>{{ movie[0] }}</td>
                <td>{{ movie[1] }}</td>
                <td>{{ movie[2] }}</td>
                <td>{{ movie[3] }}</td>
                <td>{{ movie[4] }}</td>
            </tr>
            {% endfor %}

        </table>

    </div>
    

        
</body>
</html>
